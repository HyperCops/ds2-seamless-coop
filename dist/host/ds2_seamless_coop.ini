# DS2 Seamless Co-op — Configuration (Hote ou Joueur, c'est pareil)
# Copiez tous les fichiers dans : Dark Souls II Scholar of the First Sin/Game/
#
# SETUP RAPIDE :
#   1. Choisissez un mot de passe et mettez-le dans session_password
#   2. Donnez ce meme mot de passe a votre ami (il le met dans son .ini)
#   3. Lancez DS2 — appuyez sur INSERT — choisissez Heberger ou Rejoindre
#   4. Pas besoin de serveur, pas besoin d'IP, pas besoin de Hamachi !
#
# Transport : Steamworks P2P (lobby Steam prive)

enabled=true
debug_logging=false
max_players=6

# Mot de passe de session — meme valeur chez l'hote ET le joueur
session_password=coop

# Gameplay
allow_invasions=false
sync_bonfires=true
sync_items=false
sync_enemies=false
