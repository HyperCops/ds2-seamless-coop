# DS2 Seamless Co-op — Configuration (Hote ou Joueur, c'est pareil)
# Copiez tous les fichiers dans : Dark Souls II Scholar of the First Sin/Game/
#
# SETUP RAPIDE :
#   1. Mettez le meme mot de passe que l'hote dans session_password ci-dessous
#   2. Lancez DS2 — appuyez sur INSERT — cliquez "Rejoindre une session"
#   3. Pas besoin d'IP, pas besoin de serveur, pas besoin de Hamachi !
#
# Transport : Steamworks P2P (lobby Steam prive)

enabled=true
debug_logging=false
max_players=6

# Mot de passe de session — meme valeur chez l'hote ET le joueur
session_password=coop

# Gameplay
allow_invasions=false
sync_bonfires=true
sync_items=false
sync_enemies=false
